# أحداث entity
domain: entity
version: 1.0.0
events:
  - name: entity.created
    description: إنشاء كيان
    payload:
      type: object
      required: [id, occurred_at]
      properties:
        id: { type: string, format: uuid }
        occurred_at: { type: string, format: date-time }
        actor: { type: string }
        data: { type: object, additionalProperties: true }
  - name: entity.merged
    description: دمج
    payload:
      type: object
      required: [id, occurred_at]
      properties:
        id: { type: string, format: uuid }
        occurred_at: { type: string, format: date-time }
        actor: { type: string }
        data: { type: object, additionalProperties: true }
  - name: entity.updated
    description: تعديل
    payload:
      type: object
      required: [id, occurred_at]
      properties:
        id: { type: string, format: uuid }
        occurred_at: { type: string, format: date-time }
        actor: { type: string }
        data: { type: object, additionalProperties: true }
