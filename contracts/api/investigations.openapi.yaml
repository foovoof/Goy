openapi: 3.1.0
info:
  title: Investigations API
  version: 1.0.0
  description: إدارة التحقيقات
servers:
  - url: https://api.goy.local/v1
tags:
  - name: Investigations
paths:
  /investigations:
    get:
      tags: [Investigations]
      summary: قائمة investigations
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: قائمة العناصر
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/Investigations' }
                  page: { type: integer }
                  total: { type: integer }
    post:
      tags: [Investigations]
      summary: إنشاء investigation
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Investigations' }
      responses:
        '201':
          description: تم الإنشاء
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Investigations' }
  /investigations/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Investigations]
      summary: قراءة عنصر
      responses:
        '200':
          description: العنصر
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Investigations' }
        '404': { description: غير موجود }
    patch:
      tags: [Investigations]
      summary: تحديث جزئي
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Investigations' }
      responses:
        '200':
          description: تم التحديث
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Investigations' }
    delete:
      tags: [Investigations]
      summary: حذف
      responses:
        '204': { description: تم الحذف }
components:
  parameters:
    Page:
      name: page
      in: query
      schema: { type: integer, minimum: 1, default: 1 }
    PageSize:
      name: page_size
      in: query
      schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
  schemas:
    Investigations:
      type: object
      required: [id]
      properties:
        id: { type: string, format: uuid }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        name: { type: string }
        metadata: { type: object, additionalProperties: true }
