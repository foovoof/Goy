# أحداث report
domain: report
version: 1.0.0
events:
  - name: report.generated
    description: توليد
    payload:
      type: object
      required: [id, occurred_at]
      properties:
        id: { type: string, format: uuid }
        occurred_at: { type: string, format: date-time }
        actor: { type: string }
        data: { type: object, additionalProperties: true }
  - name: report.published
    description: نشر
    payload:
      type: object
      required: [id, occurred_at]
      properties:
        id: { type: string, format: uuid }
        occurred_at: { type: string, format: date-time }
        actor: { type: string }
        data: { type: object, additionalProperties: true }
  - name: report.revoked
    description: سحب
    payload:
      type: object
      required: [id, occurred_at]
      properties:
        id: { type: string, format: uuid }
        occurred_at: { type: string, format: date-time }
        actor: { type: string }
        data: { type: object, additionalProperties: true }
