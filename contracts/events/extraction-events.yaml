# أحداث extraction
domain: extraction
version: 1.0.0
events:
  - name: extraction.started
    description: بدء الاستخراج
    payload:
      type: object
      required: [id, occurred_at]
      properties:
        id: { type: string, format: uuid }
        occurred_at: { type: string, format: date-time }
        actor: { type: string }
        data: { type: object, additionalProperties: true }
  - name: extraction.completed
    description: إكمال
    payload:
      type: object
      required: [id, occurred_at]
      properties:
        id: { type: string, format: uuid }
        occurred_at: { type: string, format: date-time }
        actor: { type: string }
        data: { type: object, additionalProperties: true }
  - name: extraction.failed
    description: فشل
    payload:
      type: object
      required: [id, occurred_at]
      properties:
        id: { type: string, format: uuid }
        occurred_at: { type: string, format: date-time }
        actor: { type: string }
        data: { type: object, additionalProperties: true }
